

[env:esp32-s3-n16r8]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino

; 🔑 Критичные настройки для ESP32-S3-N16R8
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv

; 🔑 Частота ЦП и память
build_flags =
    -D CORE_DEBUG_LEVEL=3          ; ESP_LOG_DEBUG
    -D ARDUINO_USB_MODE=1          ; USB CDC
    -D ARDUINO_USB_CDC_ON_BOOT=1   ; Авто-подключение к Serial
    -D CONFIG_ESP32S3_SPIRAM_SUPPORT=1
    -D CONFIG_SPIRAM_CACHE_WORKAROUND=1
    -O2                            ; Оптимизация (баланс скорость/размер)

; 🔑 Библиотеки
lib_deps =
    jgromes/RadioLib@^7.6.0
    ; Локальные модули проекта (через lib_extra_dirs)

lib_extra_dirs =
    $PROJECT_DIR/lib
    $PROJECT_DIR/include

; 🔑 Мониторинг
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize
upload_speed = 921600
