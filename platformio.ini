; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32 @ ^6.5.0          # ✅ Версия платформы с поддержкой IDF 5.x
board = esp32-s3-devkitc-1
framework = arduino

# 🔑 КРИТИЧНО: Указываем версию ESP-IDF
board_build.esp-idf.version = 5.2.2      # или 5.0.4, 5.1.2 и т.д.

# инициализируем Serial.begin(115200)
monitor_speed = 115200

# 🔑 Опции сборки для доступа к компонентам
build_flags = 
    -D CONFIG_IDF_TARGET_ESP32S3
    -D CORE_DEBUG_LEVEL=3                # ESP_LOG_DEBUG
    -D ARDUINO_USB_CDC_ON_BOOT=1         # Для нативного USB на S3
    -D CONFIG_ESP_ADC_CAL_ENABLED=y
    -D CONFIG_ADC_CALI_SUPPORTED=y
    -D ARDUINO_USB_MODE=1
    -D CORE_DEBUG_LEVEL=3

# 🔑 Библиотеки
lib_deps = 
    jgromes/RadioLib@^7.6.0