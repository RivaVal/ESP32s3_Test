; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
;    [env:esp32-s3-devkitc-1]
    [env:esp32s3_uav]
;    platform = espressif32@6.8.0          ; ESP-IDF 5.2.x (стабильная)
;    board = esp32-s3-devkitc-1
;    framework = arduino
    platform = espressif32@6.8.0          ; ESP-IDF 5.2.x (стабильная)
    board = esp32-s3-devkitc-1
    framework = arduino

; Настройки для 16MB Flash + 8MB PSRAM --- КРИТИЧНЫЕ настройки памяти для N16R8 ---
    board_build.flash_mode = dio          ; ⚠️ Flash: DIO (НЕ OPI!)
    board_build.psram_type = opi          ; ✅ PSRAM: OPI
    board_build.f_cpu = 240000000L        ; 240 MHz
    board_upload.flash_size = 16MB
    board_upload.maximum_size = 16777216
    board_build.partitions = default_16MB.csv
; csv

; --- USB CDC для отладки ---
board_build.usb_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Включаем PSRAM и USB CDC
board_build.extra_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Монитор порта ---
    monitor_speed = 115200
    monitor_filters = esp32_exception_decoder, time


; --- Флаги компиляции ---
build_flags =
    -DCORE_DEBUG_LEVEL=3              ; INFO по умолчанию (меняйте на 4 для DEBUG)
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
    -DCONFIG_LWIP_TCP_OVERSIZE_MSS=1
    -Wall -Wextra
    -fstack-protector
    ; -DCORE_DEBUG_LEVEL=4            ; ← Раскомментировать для отладки DEBUG

; --- Зависимости ---
lib_deps =
    jgromes/RadioLib@7.6.0    ; ✅ LoRa SX1278 driver (ШАГ 2)
    ; ✅ I2C и SPI уже встроены в Arduino-ESP32, явно не нужны
